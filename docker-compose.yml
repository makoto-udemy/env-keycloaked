services:
  reverse-proxy:
    image: nginx:1.27-alpine
    ports:
      - "${REVERSE_PROXY_HOST_PORT:-10800}:800"
    volumes:
      - ${HOST_WORKSPACE_DIR:-.}/infra/nginx:/etc/nginx/conf.d:ro
    depends_on:
      - keycloak
      - frontend
      - backend

  keycloak:
    image: quay.io/keycloak/keycloak:26.3
    command: ["start-dev", "--http-port=8080"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HTTP_RELATIVE_PATH: /auth
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "${KEYCLOAK_HOST_PORT:-18080}:8080"

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_HOST_PORT:-15173}:5173"
    volumes:
      - ${HOST_WORKSPACE_DIR:-.}/frontend:/app
      - frontend_node_modules:/app/node_modules

  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - ${HOST_WORKSPACE_DIR:-.}/backend:/app

volumes:
  frontend_node_modules:
